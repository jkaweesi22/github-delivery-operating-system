name: Sprint Planning
description: Plan sprint scope; each feature becomes a task issue
title: "SPRINT - "
labels: ["sprint", "planning", "sprint-planning"]

body:
  - type: markdown
    attributes:
      value: |
        # Sprint Planning

        Enter ONE feature per line.
        Do not use bullets.
        Do not number items.
        Do not combine multiple features on one line.

  - type: input
    id: sprint_name
    attributes:
      label: Sprint Name
      placeholder: Sprint 12 - March 1–14
    validations:
      required: true

  - type: input
    id: sprint_dates
    attributes:
      label: Sprint Dates
      placeholder: YYYY-MM-DD to YYYY-MM-DD
    validations:
      required: true

  - type: textarea
    id: sprint_goal
    attributes:
      label: Sprint Goal
    validations:
      required: true

  - type: textarea
    id: sprint_features
    attributes:
      label: Sprint Features (One Per Line)
      placeholder: |
        Implement burn-down chart
        Add sprint health indicator
        Prevent duplicate child creation
    validations:
      required: true

  - type: dropdown
    id: sprint_approval
    attributes:
      label: Sprint Approved
      options:
        - Pending
        - Approved
        - Rejected
