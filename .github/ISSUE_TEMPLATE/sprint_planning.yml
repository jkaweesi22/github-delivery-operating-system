name: "SPRINT PLANNING"
description: "Plan sprint scope; each feature becomes a task issue"
title: "SPRINT - [Sprint Name]"
labels: ["sprint", "planning"]

body:
  - type: markdown
    attributes:
      value: |
        # SPRINT PLANNING

        Enter ONE feature per line.
        Do not use bullets.
        Do not number items.
        Do not combine multiple features on one line.

  - type: input
    id: sprint_name
    attributes:
      label: "Sprint Name"
      placeholder: "Sprint 12 - March 1–14"
    validations:
      required: true

  - type: markdown
    attributes:
      value: |
        ### Sprint Dates
        **📅 [Open calendar](https://raw.githack.com/jkaweesi22/github-delivery-operating-system/main/docs/sprint-calendar.html)** — pick dates, enter this repo's URL, click Create. Dates will appear below.

  - type: input
    id: sprint_dates
    attributes:
      label: "Sprint Dates"
      description: "YYYY-MM-DD to YYYY-MM-DD (from calendar or type)"
      placeholder: "2026-03-07 to 2026-03-21"
    validations:
      required: true

  - type: textarea
    id: sprint_goal
    attributes:
      label: "Sprint Goal"
    validations:
      required: true

  - type: textarea
    id: sprint_features
    attributes:
      label: "Sprint Features (One Per Line)"
      placeholder: |
        Implement burn-down chart
        Add sprint health indicator
        Prevent duplicate child creation
    validations:
      required: true

  - type: dropdown
    id: sprint_approval
    attributes:
      label: "Sprint Approved"
      options:
        - "Pending"
        - "Approved"
        - "Rejected"
