name: "SPRINT PLANNING"
description: "Plan sprint scope; each feature becomes a task issue"
title: "SPRINT - [Sprint Name]"
labels: ["sprint", "planning"]

body:
  - type: markdown
    attributes:
      value: |
        # SPRINT PLANNING

        Enter ONE feature per line.
        Do not use bullets.
        Do not number items.
        Do not combine multiple features on one line.

  - type: input
    id: sprint_name
    attributes:
      label: "Sprint Name"
      placeholder: "Sprint 12 - March 1–14"
    validations:
      required: true

  - type: dropdown
    id: sprint_dates
    attributes:
      label: "Sprint Dates"
      description: "Select a 2-week sprint (scroll to find your dates)"
      options:
        - "2026-03-07 to 2026-03-21"
        - "2026-03-14 to 2026-03-28"
        - "2026-03-21 to 2026-04-04"
        - "2026-03-28 to 2026-04-11"
        - "2026-04-04 to 2026-04-18"
        - "2026-04-11 to 2026-04-25"
        - "2026-04-18 to 2026-05-02"
        - "2026-04-25 to 2026-05-09"
        - "2026-05-02 to 2026-05-16"
        - "2026-05-09 to 2026-05-23"
        - "2026-05-16 to 2026-05-30"
        - "2026-05-23 to 2026-06-06"
        - "2026-06-06 to 2026-06-20"
        - "2026-06-13 to 2026-06-27"
        - "2026-06-20 to 2026-07-04"
        - "2026-06-27 to 2026-07-11"
        - "2026-07-04 to 2026-07-18"
        - "2026-07-11 to 2026-07-25"
        - "2026-07-18 to 2026-08-01"
        - "2026-07-25 to 2026-08-08"
        - "2026-08-01 to 2026-08-15"
        - "2026-08-08 to 2026-08-22"
        - "2026-08-15 to 2026-08-29"
        - "2026-08-22 to 2026-09-05"
        - "2026-08-29 to 2026-09-12"
        - "2026-09-05 to 2026-09-19"
        - "2026-09-12 to 2026-09-26"
        - "2026-09-19 to 2026-10-03"
        - "2026-09-26 to 2026-10-10"
        - "2026-10-03 to 2026-10-17"
        - "2026-10-10 to 2026-10-24"
        - "2026-10-17 to 2026-10-31"
        - "2026-10-24 to 2026-11-07"
        - "2026-10-31 to 2026-11-14"
        - "2026-11-07 to 2026-11-21"
        - "2026-11-14 to 2026-11-28"
        - "2026-11-21 to 2026-12-05"
        - "2026-11-28 to 2026-12-12"
        - "2026-12-05 to 2026-12-19"
        - "2026-12-12 to 2026-12-26"
    validations:
      required: true

  - type: textarea
    id: sprint_goal
    attributes:
      label: "Sprint Goal"
    validations:
      required: true

  - type: textarea
    id: sprint_features
    attributes:
      label: "Sprint Features (One Per Line)"
      placeholder: |
        Implement burn-down chart
        Add sprint health indicator
        Prevent duplicate child creation
    validations:
      required: true

  - type: dropdown
    id: sprint_approval
    attributes:
      label: "Sprint Approved"
      options:
        - "Pending"
        - "Approved"
        - "Rejected"
