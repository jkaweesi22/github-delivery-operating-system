# Enable Delivery OS – Telegram Alerts (self-test)
# Phanerooapp-style: issues opened/closed/reopened, comments, PR merged

name: Enable Delivery OS – Telegram Alerts

on:
  issues:
    types: [opened, closed, reopened]
  issue_comment:
    types: [created]
  pull_request:
    types: [closed]

jobs:
  call-telegram-alerts:
    if: |
      github.event_name == 'issues' ||
      github.event_name == 'issue_comment' ||
      (github.event_name == 'pull_request' && github.event.pull_request.merged == true)
    uses: jkaweesi22/github-delivery-operating-system/.github/workflows/telegram-alerts.yml@main
    with:
      bug_label: "bug"
      qa_label: "qa"
      qa_request_label: "qa-request"
      sprint_label: "sprint"
      planning_label: "planning"
      sprint_planning_label: "sprint-planning"
      sprint_active_label: "sprint-active"
      production_label: "production"
      release_approver_username: ""
      timezone: "Africa/Nairobi"
      enable_telegram: true
    secrets: inherit
