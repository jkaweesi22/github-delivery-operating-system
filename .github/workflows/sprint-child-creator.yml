name: Sprint Child Issue Creator

on:
  issues:
    types: [opened]

jobs:
  create-child-issues:
    if: contains(github.event.issue.title, 'SPRINT -')
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract Sprint Features
        id: extract
        run: |
          FEATURES=$(echo "${{ github.event.issue.body }}" | \
            awk '/^### Sprint Features/{flag=1;next}/^###/{if(flag) exit}flag' | \
            sed '/^[[:space:]]*$/d')

          echo "features<<EOF" >> $GITHUB_OUTPUT
          echo "$FEATURES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create Child Issues
        if: steps.extract.outputs.features != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          parent_number="${{ github.event.issue.number }}"

          while IFS= read -r feature; do
            if [ -z "${feature// }" ]; then
              continue
            fi

            gh issue create \
              --title "$feature" \
              --body "Parent Sprint: #$parent_number" \
              --label "sprint-active"
          done <<< "${{ steps.extract.outputs.features }}"
