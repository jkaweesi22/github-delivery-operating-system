name: Sprint Child Issue Creator

on:
  issues:
    types: [opened]

jobs:
  create-child-issues:
    if: contains(github.event.issue.title, 'SPRINT -')
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract Sprint Features
        id: extract
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: |
          printf '%s' "$ISSUE_BODY" | \
            awk '/^### Sprint Features/{flag=1;next}/^###/{if(flag) exit}flag' | \
            sed '/^[[:space:]]*$/d' > features.txt
          echo "has_features<<EOF" >> $GITHUB_OUTPUT
          [ -s features.txt ] && echo "true" >> $GITHUB_OUTPUT || echo "false" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create Child Issues
        if: steps.extract.outputs.has_features == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          parent_number="${{ github.event.issue.number }}"
          while IFS= read -r feature; do
            feature=$(echo "$feature" | xargs)
            [ -z "$feature" ] && continue
            title_safe="${feature//\"/\\\"}"
            gh issue create \
              --title "$title_safe" \
              --body "Parent Sprint: #$parent_number"
          done < features.txt
