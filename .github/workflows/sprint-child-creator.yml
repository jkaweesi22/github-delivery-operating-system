name: Sprint Child Issue Creator

on:
  issues:
    types: [opened]

# Required: repo must have Settings → Actions → Workflow permissions → Read and write
permissions:
  issues: write
  contents: read

jobs:
  create-child-issues:
    if: contains(github.event.issue.title, 'SPRINT -')
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract Sprint Features
        id: extract
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: |
          printf '%s' "$ISSUE_BODY" | \
            awk '/^### Sprint Features/{flag=1;next}/^###/{if(flag) exit}flag' | \
            sed '/^[[:space:]]*$/d' > features.txt

      - name: Create Child Issues
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          parent_number="${{ github.event.issue.number }}"
          body_content=$(printf 'Parent Sprint: #%s\n\n---\n*Created by Delivery OS Sprint Child Creator*' "$parent_number")

          while IFS= read -r feature; do
            feature=$(echo "$feature" | xargs)
            [ -z "$feature" ] && continue
            title_safe="${feature//\"/\\\"}"

            gh issue create \
              --title "$title_safe" \
              --body "$body_content" \
              --label "sprint-active"
          done < features.txt
