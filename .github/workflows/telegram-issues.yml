name: GitHub вҶ’ Telegram Alerts

on:
  issues:
    types: [opened, closed, reopened]

  issue_comment:
    types: [created]

  pull_request:
    types: [closed]

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - name: Send Telegram Alert
        shell: bash
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          RELEASE_APPROVER: ${{ vars.RELEASE_APPROVER || 'release-approver' }}
        run: |
          EVENT="${{ github.event_name }}"
          ACTION="${{ github.event.action }}"
          ACTOR="${{ github.actor }}"
          TIMESTAMP=$(TZ=Africa/Nairobi date +"%Y-%m-%d %-I:%M %p EAT")
          MESSAGE=""

          if [ -z "$TELEGRAM_BOT_TOKEN" ] || [ -z "$TELEGRAM_CHAT_ID" ]; then
            echo "Telegram secrets not configured. Skipping."
            exit 0
          fi

          if [ "$EVENT" = "issues" ]; then

            TITLE="${{ github.event.issue.title }}"
            URL="${{ github.event.issue.html_url }}"

            if [[ "${{ contains(github.event.issue.labels.*.name || fromJSON('[]'), 'bug') }}" == "true" ]]; then
              if [ "$ACTION" = "opened" ]; then
                MESSAGE="рҹҹўрҹӘІ BUG OPENED%0A$TITLE%0A$URL%0A---%0Aрҹ‘Ө $ACTOR%0Aрҹ•’ $TIMESTAMP"
              elif [ "$ACTION" = "reopened" ]; then
                MESSAGE="рҹҹЎвҷ»пёҸ BUG REOPENED%0A$TITLE%0A$URL%0A---%0Aрҹ‘Ө $ACTOR%0Aрҹ•’ $TIMESTAMP"
              elif [ "$ACTION" = "closed" ]; then
                MESSAGE="рҹҹЈвң… BUG CLOSED%0A$TITLE%0A$URL%0A---%0Aрҹ‘Ө $ACTOR%0Aрҹ•’ $TIMESTAMP"
              fi
            fi

            if [[ "${{ contains(github.event.issue.labels.*.name || fromJSON('[]'), 'qa') }}" == "true" ]] || \
               [[ "${{ contains(github.event.issue.labels.*.name || fromJSON('[]'), 'qa-request') }}" == "true" ]]; then
              if [ "$ACTION" = "opened" ]; then
                MESSAGE="рҹ”өрҹ§Ә QA REQUEST OPENED%0A$TITLE%0A$URL%0A---%0Aрҹ‘Ө $ACTOR%0Aрҹ•’ $TIMESTAMP"
              elif [ "$ACTION" = "reopened" ]; then
                MESSAGE="рҹҹ рҹ”Ғ QA REQUEST REOPENED%0A$TITLE%0A$URL%0A---%0Aрҹ‘Ө $ACTOR%0Aрҹ•’ $TIMESTAMP"
              elif [ "$ACTION" = "closed" ]; then
                MESSAGE="рҹҹўвң… QA REQUEST CLOSED%0A$TITLE%0A$URL%0A---%0Aрҹ‘Ө $ACTOR%0Aрҹ•’ $TIMESTAMP"
              fi
            fi

            if [[ "${{ contains(github.event.issue.labels.*.name || fromJSON('[]'), 'sprint') }}" == "true" ]] && \
               [[ "${{ contains(github.event.issue.labels.*.name || fromJSON('[]'), 'planning') }}" == "true" ]]; then
              if [ "$ACTION" = "opened" ]; then
                MESSAGE="рҹҹЈрҹ“Ӣ SPRINT CREATED%0A$TITLE%0A$URL%0A---%0Aрҹ‘Ө $ACTOR%0Aрҹ•’ $TIMESTAMP"
              fi
            fi

            if [[ "${{ contains(github.event.issue.labels.*.name || fromJSON('[]'), 'sprint-active') }}" == "true" ]]; then
              if [ "$ACTION" = "opened" ]; then
                MESSAGE="рҹҹЎрҹӣ пёҸ SPRINT TASK CREATED%0A$TITLE%0A$URL%0A---%0Aрҹ‘Ө $ACTOR%0Aрҹ•’ $TIMESTAMP"
              elif [ "$ACTION" = "closed" ]; then
                MESSAGE="рҹҹўвң… SPRINT TASK COMPLETED%0A$TITLE%0A$URL%0A---%0Aрҹ‘Ө $ACTOR%0Aрҹ•’ $TIMESTAMP"
              fi
            fi

            if [[ "${{ contains(github.event.issue.labels.*.name || fromJSON('[]'), 'production') }}" == "true" ]]; then
              if [ "$ACTION" = "opened" ]; then
                MESSAGE="рҹҡҖрҹ“Ұ PRODUCTION RELEASE CREATED%0A$TITLE%0A$URL%0A---%0Aрҹ‘Ө $ACTOR%0Aрҹ•’ $TIMESTAMP"
              elif [ "$ACTION" = "closed" ]; then
                MESSAGE="рҹҹЈрҹҡҖ RELEASE CLOSED%0A$TITLE%0A$URL%0A---%0Aрҹ‘Ө $ACTOR%0Aрҹ•’ $TIMESTAMP"
              fi
            fi
          fi

          if [ "$EVENT" = "issue_comment" ]; then

            TITLE="${{ github.event.issue.title }}"
            URL="${{ github.event.issue.html_url }}"
            COMMENT_BODY="${{ github.event.comment.body }}"
            COMMENT=$(echo "$COMMENT_BODY" | head -c 300)

            if [[ "$ACTOR" == "$RELEASE_APPROVER" ]] && echo "$COMMENT_BODY" | grep -iq "declined\|reject\|not approved"; then
              MESSAGE="рҹ”ҙрҹӣ‘ RELEASE DECLINED%0A$TITLE%0A$URL%0A---%0Aрҹ‘Ө $ACTOR%0Aрҹ•’ $TIMESTAMP"

            elif [[ "$ACTOR" == "$RELEASE_APPROVER" ]] && echo "$COMMENT_BODY" | grep -iq "^approved"; then
              MESSAGE="рҹҹўрҹӣЎпёҸ RELEASE APPROVED%0A$TITLE%0A$URL%0A---%0Aрҹ‘Ө $ACTOR%0Aрҹ•’ $TIMESTAMP"

            elif [[ "${{ contains(github.event.issue.labels.*.name || fromJSON('[]'), 'bug') }}" == "true" ]]; then
              MESSAGE="рҹ’¬рҹӘІ BUG COMMENT%0A$TITLE%0A$URL%0A---%0A$COMMENT%0A---%0Aрҹ‘Ө $ACTOR%0Aрҹ•’ $TIMESTAMP"

            elif [[ "${{ contains(github.event.issue.labels.*.name || fromJSON('[]'), 'qa') }}" == "true" ]] || \
                 [[ "${{ contains(github.event.issue.labels.*.name || fromJSON('[]'), 'qa-request') }}" == "true" ]]; then
              MESSAGE="рҹ’¬рҹ§Ә QA COMMENT%0A$TITLE%0A$URL%0A---%0A$COMMENT%0A---%0Aрҹ‘Ө $ACTOR%0Aрҹ•’ $TIMESTAMP"

            elif [[ "${{ contains(github.event.issue.labels.*.name || fromJSON('[]'), 'production') }}" == "true" ]]; then
              MESSAGE="рҹ’¬рҹҡҖ RELEASE COMMENT%0A$TITLE%0A$URL%0A---%0A$COMMENT%0A---%0Aрҹ‘Ө $ACTOR%0Aрҹ•’ $TIMESTAMP"

            elif [[ "${{ contains(github.event.issue.labels.*.name || fromJSON('[]'), 'sprint-active') }}" == "true" ]]; then
              MESSAGE="рҹ’¬рҹӣ пёҸ SPRINT TASK COMMENT%0A$TITLE%0A$URL%0A---%0A$COMMENT%0A---%0Aрҹ‘Ө $ACTOR%0Aрҹ•’ $TIMESTAMP"
            fi
          fi

          if [ "$EVENT" = "pull_request" ]; then
            PR_MERGED="${{ github.event.pull_request.merged }}"
            PR_BASE="${{ github.event.pull_request.base.ref }}"
            PR_TITLE="${{ github.event.pull_request.title }}"
            PR_URL="${{ github.event.pull_request.html_url }}"

            if [ "$PR_MERGED" = "true" ] && [ "$PR_BASE" = "main" ]; then
              MESSAGE="рҹҹўрҹ”Җ PR MERGED TO MAIN%0A$PR_TITLE%0A$PR_URL%0A---%0Aрҹ‘Ө $ACTOR%0Aрҹ•’ $TIMESTAMP"
            fi
          fi

          if [ -n "$MESSAGE" ]; then
            curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
              -d chat_id="${TELEGRAM_CHAT_ID}" \
              -d text="${MESSAGE}"
          fi
