# Delivery OS – Notify Release Approver
# Reusable: post approval request comment when production release issue is opened
name: Delivery OS – Notify Release Approver

on:
  workflow_call:
    inputs:
      release_approver_username:
        required: true
        type: string
        description: "GitHub username to notify (e.g. aMugabi)"
      production_label:
        required: false
        type: string
        default: "production"
      project_name:
        required: false
        type: string
        default: ""

jobs:
  delivery-os-notify:
    name: Post approval request
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Post approval comment
        uses: actions/github-script@v7
        env:
          APPROVER: ${{ inputs.release_approver_username }}
          PROD_LABEL: ${{ inputs.production_label }}
          PROJECT: ${{ inputs.project_name }}
        with:
          script: |
            const labels = (context.payload.issue.labels || []).map(l => l.name);
            if (!labels.includes(process.env.PROD_LABEL)) return;

            const issueTitle = context.payload.issue.title;
            const issueBody = context.payload.issue.body || '';
            const approver = process.env.APPROVER;
            const project = process.env.PROJECT || '';

            let sprintRef = 'Not specified';
            const sprintMatch = issueBody.match(/#\d+/);
            if (sprintMatch) sprintRef = sprintMatch[0];

            let qaRecommendation = 'Not specified';
            if (issueBody.includes('Approve for Production')) qaRecommendation = 'Approve for Production';
            else if (issueBody.includes('Reject Release')) qaRecommendation = 'Reject Release';
            else if (issueBody.includes('Conditional Approval')) qaRecommendation = 'Conditional Approval';

            const projectLine = project ? `**Project:** ${project}\n\n` : '';
            const commentBody =
              `🚨 @${approver} Production Release requires approval.\n\n` +
              projectLine +
              `**Issue:** ${issueTitle}\n\n` +
              `**Linked Sprint:** ${sprintRef}\n\n` +
              `**QA Recommendation:** ${qaRecommendation}\n\n` +
              'Please review the sprint delivery and QA sign-off details above before approving deployment.\n\n' +
              '🔒 Deployment must not proceed without your approval.';

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: commentBody
            });
