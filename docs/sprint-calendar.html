<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sprint Date Picker</title>
  <style>
    * { box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; max-width: 400px; margin: 2rem auto; padding: 1rem; }
    h1 { font-size: 1.25rem; margin-bottom: 1rem; }
    label { display: block; font-weight: 500; margin-top: 1rem; }
    input[type="date"] { width: 100%; padding: 0.5rem; font-size: 1rem; margin-top: 0.25rem; }
    input[type="url"] { width: 100%; padding: 0.5rem; font-size: 0.9rem; margin-top: 0.25rem; }
    button { margin-top: 1.5rem; padding: 0.75rem 1.5rem; font-size: 1rem; background: #238636; color: white; border: none; border-radius: 6px; cursor: pointer; }
    button:hover { background: #2ea043; }
    button:disabled { background: #ccc; cursor: not-allowed; }
    .hint { font-size: 0.85rem; color: #57606a; margin-top: 0.25rem; }
  </style>
</head>
<body>
  <h1>📅 Sprint Date Picker</h1>
  <p class="hint">Pick dates with the calendar, then create your sprint issue with dates pre-filled.</p>

  <label for="repo">GitHub repo URL</label>
  <input type="url" id="repo" placeholder="https://github.com/owner/repo" />

  <label for="start">Sprint Start</label>
  <input type="date" id="start" />

  <label for="end">Sprint End</label>
  <input type="date" id="end" />

  <button id="create" disabled>Create Sprint Issue</button>

  <script>
    const repo = document.getElementById('repo');
    const start = document.getElementById('start');
    const end = document.getElementById('end');
    const btn = document.getElementById('create');

    function update() {
      const r = repo.value.trim().replace(/\/$/, '');
      const s = start.value;
      const e = end.value;
      btn.disabled = !(r && s && e && new Date(s) <= new Date(e));
    }

    repo.addEventListener('input', update);
    start.addEventListener('input', update);
    end.addEventListener('input', update);

    btn.addEventListener('click', () => {
      const base = repo.value.trim().replace(/\/$/, '');
      const dates = start.value + ' to ' + end.value;
      const url = base + '/issues/new?template=sprint_planning.yml&sprint_dates=' + encodeURIComponent(dates);
      window.open(url, '_blank');
    });

    const params = new URLSearchParams(location.search);
    if (params.get('repo')) repo.value = params.get('repo');
    if (params.get('start')) start.value = params.get('start');
    if (params.get('end')) end.value = params.get('end');
  </script>
</body>
</html>
