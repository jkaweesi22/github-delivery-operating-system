# Copy to .github/workflows/delivery-os-intake-governance.yml
# Replace your-org with your GitHub org or username
# Use @main for latest, or @v1.0.0 (create tag first: git tag v1.0.0 && git push origin v1.0.0)

name: Enable Delivery OS – Intake Governance

on:
  issues:
    types: [opened, edited, labeled]
  pull_request:
    types: [opened, edited, labeled]

jobs:
  call-intake-governance:
    uses: your-org/github-delivery-operating-system/.github/workflows/intake-governance.yml@main
    with:
      intake_label: "intake"
    secrets: inherit
