# Copy to .github/workflows/delivery-os-release-control.yml
# Replace your-org with your GitHub org or username
# Use @main for latest, or @v1.0.0 (create tag first: git tag v1.0.0 && git push origin v1.0.0)

name: Enable Delivery OS – Release Control

on:
  issues:
    types: [opened, labeled]
  pull_request:
    types: [labeled]

jobs:
  call-release-control:
    permissions:
      issues: write
      pull-requests: write
    if: |
      github.event_name == 'pull_request' && contains(github.event.label.name, 'production') ||
      github.event_name == 'issues' && (
        github.event.action == 'labeled' && contains(github.event.label.name, 'production') ||
        github.event.action == 'opened' && contains(github.event.issue.labels.*.name || fromJSON('[]'), 'production')
      )
    uses: your-org/github-delivery-operating-system/.github/workflows/release-control.yml@main
    with:
      release_approver: "@release-approver"
      production_label: "production"
      enable_alerts: true
      enable_telegram: true
      enable_whatsapp: false
    secrets: inherit
